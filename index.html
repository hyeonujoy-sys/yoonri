  /* 상단 정보바 */
  .top-info {
    position: absolute;
    top: 20px; right: 20px;
    background: rgba(255, 255, 255, 0.9);
    padding: 8px 16px;
    border-radius: 30px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    display: flex; align-items: center; gap: 10px;
    z-index: 10;
  }

  /* 스테이지 버튼 1~9 */
  .stage-btn {
    position: absolute;
    width: 44px; height: 44px;
    background: #ff9800;
    border: 3px solid #fff;
    border-radius: 50%;
    color: white;
    display: flex; justify-content: center; align-items: center;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.2s, background 0.2s;
    z-index: 5;
    text-decoration: none;
  }
  .stage-btn:hover { transform: scale(1.2); background: #f57c00; }

  .stage-btn.locked {
    background: rgba(180,180,180,0.85);
    border-color: #ccc;
    color: #555;
    cursor: default;
  }
  .stage-btn.star {
    background: linear-gradient(135deg, #f6d365, #fda085);
    border-color: #ffd700;
    font-size: 1.4em;
  }

  /* 핀 좌표 (분석된 좌표값 반영) */
  #btn1 { left: 32%; top: 24%; }
  #btn2 { left: 45%; top: 20%; }
  #btn3 { left: 62%; top: 28%; }
  #btn4 { left: 78%; top: 32%; }
  #btn5 { left: 28%; top: 48%; }
  #btn6 { left: 38%; top: 56%; }
  #btn7 { left: 48%; top: 56%; }
  #btn8 { left: 54%; top: 42%; }
  #btn9 { left: 66%; top: 54%; }
  #btnS { left: 72%; top: 62%; }

  /* 진행도 (황금 프레임) */
  .prog-container {
    position: absolute;
    bottom: 20px; left: 20px;
    width: 200px;
    cursor: pointer;
    transition: transform 0.2s;
    z-index: 10;
  }
  .prog-container:hover { transform: scale(1.05); filter: brightness(1.1); }
  .prog-container img { width: 100%; display: block; }
  
  .prog-text {
    position: absolute;
    bottom: 5px; right: 20px;
    color: #ffd700;
    font-weight: bold;
    font-size: 14px;
    text-shadow: 1px 1px 2px #000;
  }

  /* 모달 (상호작용 화면) */
  #modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    justify-content: center; align-items: center;
    backdrop-filter: blur(5px);
  }
  .modal-content {
    position: relative;
    width: 80%; max-width: 600px;
    background: #fff;
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    border: 5px solid #ffd700;
    animation: pop 0.3s ease-out;
  }
  @keyframes pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .close-btn {
    position: absolute;
    top: 15px; right: 20px;
    font-size: 24px;
    cursor: pointer;
    color: #666;
  }
  .modal-img {
    width: 150px; margin-bottom: 20px;
  }
  .modal-title { font-size: 24px; font-weight: bold; margin-bottom: 15px; color: #333; }
  .modal-list { text-align: left; display: inline-block; line-height: 1.8; color: #555; }


  /* 입장 팝업 오버레이 */
  #entry-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  #entry-box {
    background: linear-gradient(135deg, #1a3a6b 0%, #0d2444 100%);
    border: 3px solid #f0c040;
    border-radius: 20px;
    padding: 40px 50px;
    min-width: 360px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 30px rgba(240,192,64,0.3);
    text-align: center;
    font-family: 'Noto Sans KR', Arial, sans-serif;
    color: white;
  }
  #entry-box h2 {
    font-size: 2em;
    color: #f0c040;
    margin-bottom: 8px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    letter-spacing: 2px;
  }
  #entry-box .subtitle {
    font-size: 0.9em;
    color: #aac4ff;
    margin-bottom: 28px;
  }
  .entry-field {
    margin-bottom: 16px;
    text-align: left;
  }
  .entry-field label {
    display: block;
    font-size: 0.85em;
    color: #f0c040;
    margin-bottom: 6px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .entry-field input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #3a5a9b;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 1em;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .entry-field input::placeholder { color: rgba(255,255,255,0.4); }
  .entry-field input:focus { border-color: #f0c040; background: rgba(255,255,255,0.15); }
  #entry-btn {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #f0c040, #e08000);
    border: none;
    border-radius: 12px;
    color: #1a1a1a;
    font-size: 1.1em;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(240,192,64,0.4);
  }
  #entry-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(240,192,64,0.6); }
  #entry-btn:disabled {
    background: #555; color: #999; cursor: not-allowed;
    transform: none; box-shadow: none;
  }
  #entry-error {
    color: #ff6b6b;
    font-size: 0.85em;
    margin-top: 8px;
    min-height: 20px;
  }
  .entry-robot { font-size: 3em; margin-bottom: 10px; }

</style>
</head>

      <p>✅ 퀘스트 4: 좋은 데이터를 찾아라</p>
      <p>⬜ 퀘스트 5: 윤리 연구소 도착! 인공지능 윤리를 지켜라(진행중)</p>
     <p>... 4개의 퀘스트가 당신을 기다리고 있습니다!</p>

    <div style="margin-top:20px;">
        <button onclick="closeModal()" style="padding:10px 20px; border-radius:10px; border:none; background:#ffd700; font-weight:bold; cursor:pointer;">탐험 계속하기</button>
    </div>
  </div>
</div>

<script>
  function stageClick(num) {
    var labels = {5:'5단계', 6:'4단계', 7:'3단계', 8:'2단계', 9:'1단계', star:'튜토리얼'};
    var label = labels[num] || num+'단계';
    document.getElementById('modal-title').textContent = label + ' 입장!';
    document.getElementById('modal').style.display = 'flex';
  }
  function openModal() {
    document.getElementById('modal').style.display = 'flex';
  }
  function closeModal() {
    document.getElementById('modal').style.display = 'none';
  }
  window.onclick = function(e) {
    var modal = document.getElementById('modal');
    if (e.target == modal) modal.style.display = 'none';
  }

  // 입장 팝업 로직
  var codeInput = document.getElementById('entry-code');
  var nameInput = document.getElementById('entry-name');
  var entryBtn  = document.getElementById('entry-btn');

  function checkEntryReady() {
    var code = codeInput.value.trim();
    var name = nameInput.value.trim();
    entryBtn.disabled = !(code.length > 0 && name.length > 0);
  }
  codeInput.addEventListener('input', checkEntryReady);
  nameInput.addEventListener('input', checkEntryReady);
  codeInput.addEventListener('keydown', function(e){ if(e.key==='Enter') nameInput.focus(); });
  nameInput.addEventListener('keydown', function(e){ if(e.key==='Enter') enterMap(); });

  function enterMap() {
    var code = codeInput.value.trim();
    var name = nameInput.value.trim();
    var err  = document.getElementById('entry-error');
    if (!code) { err.textContent = '학급 코드를 입력해주세요!'; codeInput.focus(); return; }
    if (!name) { err.textContent = '닉네임을 입력해주세요!'; nameInput.focus(); return; }
    // 상단 정보 업데이트
    var topInfo = document.querySelector('.top-info span');
    if (topInfo) topInfo.textContent = code + '반 · ' + name;
    // 팝업 닫기
    document.getElementById('entry-overlay').style.display = 'none';
  }

</script>

</body>
</html>
